services:
  postgres:
    image: postgres:17
    container_name: postgres-db
    restart: unless-stopped
    hostname: postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    
volumes:
  postgres_data:

networks:
  app_network: